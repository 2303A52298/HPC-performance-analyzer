<!DOCTYPE html>
<html>
<head>
<title>HPC Performance Dashboard</title>

<link rel="stylesheet" href="/static/style.css">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<div class="dashboard">

<header>
<h1>⚡ HPC Performance Dashboard</h1>
<p>Analyze Serial, Parallel & Distributed Computing</p>
</header>

<div class="controls">
<input type="number" id="size" placeholder="Enter dataset size">
<button onclick="runTest()">Run Analysis</button>
</div>

<!-- Loader -->
<div id="loader" style="display:none;">
    <p>⏳ Running Analysis...</p>
    <div class="progress-bar">
        <div class="progress"></div>
    </div>
</div>

<div class="cards">

<div class="card">
<h3>Serial</h3>
<p id="serial">0</p>
</div>

<div class="card">
<h3>Parallel</h3>
<p id="parallel">0</p>
</div>

<div class="card">
<h3>Distributed</h3>
<p id="distributed">0</p>
</div>

<div class="card highlight">
<h3>Speedup</h3>
<p id="speedup">0</p>
</div>

<div class="card highlight">
<h3>Efficiency</h3>
<p id="efficiency">0</p>
</div>

</div>

<div class="charts">

<div class="chartBox">
<h3>Execution Time</h3>
<canvas id="mainChart"></canvas>
</div>

<div class="chartBox">
<h3>Performance Metrics</h3>
<canvas id="metricChart"></canvas>
</div>

</div>

</div>

<script src="/static/script.js"></script>

</body>
</html>
